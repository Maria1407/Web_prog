version: '3.8'

services:
  php:
    build: .
    volumes:
      - ./code:/var/www/html/code
      - ./tests:/var/www/html/tests
      - ./composer.json:/var/www/html/composer.json
    working_dir: /var/www/html

  test:
    build: .
    volumes:
      - ./code:/var/www/html/code
      - ./tests:/var/www/html/tests
      - ./composer.json:/var/www/html/composer.json
    working_dir: /var/www/html
    command: >
      sh -c "
        composer install &&
        vendor/bin/phpunit tests
      "